<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Force browsers to always fetch the latest version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>RevSpace — The Car Enthusiast Social Network</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="RevSpace is the ultimate social network for car enthusiasts. Share your builds, watch reels, browse the car and parts marketplace, join car clubs, find local events, and connect with the automotive community. Built for JDM, stance, muscle, track, and all car cultures." />
    <meta name="keywords" content="car enthusiasts, automotive social media, car builds, JDM, stance, muscle cars, car clubs, auto marketplace, car events, tuning, custom cars, Honda, Acura, engine swaps, dyno tuning, Altered Imports, RevSpace" />
    <meta name="author" content="RevSpace" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://revspace.app" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://revspace.app" />
    <meta property="og:title" content="RevSpace — The Car Enthusiast Social Network" />
    <meta property="og:description" content="The ultimate social platform for car enthusiasts. Share your build, watch reels, browse the marketplace, find events, and connect with the automotive community." />
    <meta property="og:image" content="/assets/uploads/free-photo-of-rear-end-of-a-car-1.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RevSpace — Car Enthusiast Social Network" />
    <meta property="og:site_name" content="RevSpace" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@RevSpaceApp" />
    <meta name="twitter:title" content="RevSpace — The Car Enthusiast Social Network" />
    <meta name="twitter:description" content="The ultimate social platform for car enthusiasts. Share your build, watch reels, browse the marketplace, find events, and connect with the automotive community." />
    <meta name="twitter:image" content="/assets/uploads/free-photo-of-rear-end-of-a-car-1.jpeg" />
    <meta name="twitter:image:alt" content="RevSpace — Car Enthusiast Social Network" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/generated/favicon-revspace.dim_512x512.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/generated/favicon-revspace.dim_512x512.png" />
    <meta name="theme-color" content="#111111" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RevSpace",
      "url": "https://revspace.app",
      "description": "RevSpace is the ultimate social network for car enthusiasts. Share builds, watch reels, buy and sell cars and parts, join car clubs, and find local automotive events.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://revspace.app/explore?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RevSpace",
      "url": "https://revspace.app",
      "logo": "https://revspace.app/assets/generated/favicon-revspace.dim_512x512.png",
      "description": "RevSpace is the premier social media platform for the global automotive community — from JDM and stance to muscle cars and track builds.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
