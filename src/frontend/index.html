<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Force browsers to always fetch the latest version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>RevSpace — The Car Enthusiast Social Network</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="RevSpace is the social platform built for car enthusiasts. Share your build, discover reels, browse the marketplace, find events, and connect with the automotive community." />
    <meta name="keywords" content="car enthusiasts, automotive social media, car builds, JDM, stance, car clubs, auto marketplace, car events, tuning, RevSpace" />
    <meta name="author" content="RevSpace" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://revspace.app" />

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://revspace.app" />
    <meta property="og:title" content="RevSpace — The Car Enthusiast Social Network" />
    <meta property="og:description" content="Share your build, discover reels, browse the marketplace, find events, and connect with the automotive community." />
    <meta property="og:image" content="/assets/uploads/free-photo-of-rear-end-of-a-car-1.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="RevSpace" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RevSpace — The Car Enthusiast Social Network" />
    <meta name="twitter:description" content="Share your build, discover reels, browse the marketplace, find events, and connect with the automotive community." />
    <meta name="twitter:image" content="/assets/uploads/free-photo-of-rear-end-of-a-car-1.jpeg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/generated/favicon-revspace.dim_512x512.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/generated/favicon-revspace.dim_512x512.png" />
    <meta name="theme-color" content="#111111" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
